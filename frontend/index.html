<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.Int — Система обліку майна</title>

    <link rel="icon" type="image/png" href="../icon.png">

    <link rel="stylesheet" href="css/tokens.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-family, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif);
            background-color: var(--color-bg-main, #f9fafb);
        }

        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 24px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #view-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <div class="app-layout">
        <main class="main-content">
            <div id="view-container">
                <div class="loading-placeholder">Завантаження інтерфейсу...</div>
            </div>
        </main>
    </div>

    <script src="js/components/event-bus.js"></script>
    <script src="js/components/api-bridge.js"></script>
    <script src="js/components/filter-panel.js"></script>
    <script src="js/components/add-modal.js"></script>
    <script src="js/components/edit-modal.js"></script>
    <script src="js/components/sub-positions-modal.js"></script>
    <script src="js/components/asset-table.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
